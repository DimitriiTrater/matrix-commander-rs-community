name: Rust CI

on:
    push:
        branches:
            - main
            - master
    pull_request:
    workflow_dispatch:

env:
    CARGO_TERM_COLOR: always

concurrency:
    group: rust-ci-${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    fmt:
        name: Format check
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - name: Install stable toolchain with rustfmt
              uses: dtolnay/rust-toolchain@stable
              with:
                  components: rustfmt

            - name: Cache cargo and target
              uses: Swatinem/rust-cache@v2

            - name: Run rustfmt check
              run: cargo fmt --all -- --check

    clippy:
        name: Clippy
        runs-on: ubuntu-latest
        continue-on-error: true
        steps:
            - uses: actions/checkout@v6

            - name: Install stable toolchain with clippy
              uses: dtolnay/rust-toolchain@stable
              with:
                  components: clippy

            - name: Cache cargo and target
              uses: Swatinem/rust-cache@v2

            - name: Run clippy
              run: cargo clippy --locked --all-targets -- -D warnings

    test:
        name: Test suite
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - name: Install stable toolchain
              uses: dtolnay/rust-toolchain@stable

            - name: Cache cargo and target
              uses: Swatinem/rust-cache@v2

            - name: Run tests
              run: cargo test --locked --all-targets

    build:
        name: Build binary
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - name: Install stable toolchain
              uses: dtolnay/rust-toolchain@stable

            - name: Cache cargo and target
              uses: Swatinem/rust-cache@v2

            - name: Build release binary
              run: cargo build --locked --release --bin matrix-commander-rs

            - name: Upload binary artifact
              uses: actions/upload-artifact@v7
              with:
                  name: matrix-commander-rs-linux-x86_64
                  path: target/release/matrix-commander-rs
                  if-no-files-found: error
